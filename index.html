<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel in Vietnam</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            line-height: 1.6;
        }

        header {
            background-color: #2c7be5;
            color: white;
            text-align: center;
            padding: 20px;
        }

        main {
            padding: 20px;
        }

        section {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            margin: 10px;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            background-color: #333;
            color: white;
            padding: 15px;
        }

        a {
            color: #2c7be5;
        }
    </style>
</head>

<body>

    <header>
        <h1>Explore Vietnam</h1>
        <p>Discover the beauty of Vietnam's most famous destinations.</p>
    </header>

    <main>

        <section>
            <h2>Top Places to Visit</h2>

            <ul>
                <li>Ha Long Bay</li>
                <li>Da Nang</li>
                <li>Ho Chi Minh City</li>
            </ul>
        </section>

        <section>
            <h2>Photo Gallery</h2>

            <img src="https://images.unsplash.com/photo-1528127269322-539801943592" alt="Ha Long Bay">

            <img src="https://images.unsplash.com/photo-1583417319070-4a69db38a482" alt="Da Nang">

            <img src="https://images.unsplash.com/photo-1585135497273-1a86b09fe70e" alt="Ho Chi Minh City">
        </section>

        <section>
            <h2>Learn More</h2>

            <p>
                Visit the official Vietnam tourism website:
                <a href="https://vietnam.travel" target="_blank">
                    Vietnam Tourism
                </a>
            </p>
        </section>

    </main>

    <footer>
        <p>Final Project - Web Design Course © 2026</p>
    </footer>

</body>
</html>
